<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="../../logo.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="2400">
    <meta property="og:title" content="課程時數紀錄">
    <meta property="og:description" content="課程時數紀錄 · 陳亮宇">
    <link rel="shortcut icon" href="../../icon.ico" type="image/x-icon">
    <link href="styles.css" rel="stylesheet" type="text/css"/>
    <script src="https://kit.fontawesome.com/5b119b2aa8.js" crossorigin="anonymous"></script>
    <title>課程時數紀錄</title>
</head>
<body>
    <nav>
        <div class="logo">TUTOR <span>HOURS</span></div>
        <div class="nav-right">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="切換模式">
                <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="sun-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </nav>

    <header>
        <div class="motto">Tutoring Hours &amp; Billing</div>
        <h1>課程時數紀錄<br><span id="student-name">載入中...</span></h1>

        <div class="month-groups">
            <div class="month-group">
                <span class="month-group-label">上個月</span>
                <div class="month-group-stats">
                    <div class="stat-block">
                        <span class="stat-label">累計時數</span>
                        <span class="stat-value" id="last-month-hours">0 小時</span>
                    </div>
                    <div class="stat-block">
                        <span class="stat-label">應收金額</span>
                        <span class="stat-value" id="last-month-amount">0 元</span>
                    </div>
                    <div class="stat-block">
                        <span class="stat-label">付款狀態</span>
                        <span class="stat-value" id="last-month-status-hero">-</span>
                    </div>
                </div>
            </div>
            <div class="month-group">
                <span class="month-group-label">這個月</span>
                <div class="month-group-stats">
                    <div class="stat-block">
                        <span class="stat-label">累計時數</span>
                        <span class="stat-value" id="this-month-hours">0 小時</span>
                    </div>
                    <div class="stat-block">
                        <span class="stat-label">累計金額</span>
                        <span class="stat-value" id="this-month-amount">0 元</span>
                    </div>
                    <div class="stat-block">
                        <span class="stat-label">狀態</span>
                        <span class="stat-value" id="this-month-status-hero">-</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section id="last-month">
        <span class="section-title">01 / Last Month</span>
        <div class="list-summary">
            <span id="last-month-title">-</span>
            <span class="list-summary-totals">共 <strong id="last-month-total-hours">0</strong> 小時・<strong id="last-month-total-amount">0</strong> 元</span>
            <span id="last-month-status-badge"></span>
        </div>
        <div class="list-header">
            <span>日期</span><span>時段</span><span>時數</span><span>模式</span><span>課堂價格</span>
        </div>
        <div class="list-container" id="last-month-list"></div>
    </section>

    <section id="this-month">
        <span class="section-title">02 / This Month</span>
        <div class="list-summary">
            <span id="this-month-title">-</span>
            <span class="list-summary-totals">共 <strong id="this-month-total-hours">0</strong> 小時・<strong id="this-month-total-amount">0</strong> 元</span>
            <span id="this-month-status-badge"></span>
        </div>
        <div class="list-header">
            <span>日期</span><span>時段</span><span>時數</span><span>模式</span><span>課堂價格</span>
        </div>
        <div class="list-container" id="this-month-list"></div>
    </section>

    <footer>
        <img src="../../logo_dark.png" alt="Logo" class="footer-logo logo-dark-mode">
        <img src="../../logo_light.png" alt="Logo" class="footer-logo logo-light-mode">
        <div class="footer-socials">
            <a href="https://github.com/liuutin9" target="_blank" class="social-icon" aria-label="GitHub">
                <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            </a>
            <a href="https://www.linkedin.com/in/you-ting-liu-490b86243/" target="_blank" class="social-icon" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24"><path d="M22.23 0H1.77C.8 0 0 .77 0 1.72v20.56C0 23.23.8 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.2 0 22.23 0zM7.12 20.45H3.56V9h3.56v11.45zM5.34 7.58c-1.14 0-2.06-.93-2.06-2.06 0-1.14.92-2.06 2.06-2.06 1.14 0 2.06.92 2.06 2.06 0 1.13-.92 2.06-2.06 2.06zM20.45 20.45h-3.56v-5.6c0-1.34-.03-3.06-1.87-3.06-1.87 0-2.15 1.46-2.15 2.96v5.7h-3.56V9h3.42v1.56h.05c.48-.9 1.65-1.85 3.36-1.85 3.6 0 4.26 2.37 4.26 5.45v6.29z"/></svg>
            </a>
        </div>
        <p style="margin-top: 15px;">&copy; 2026 劉祐廷 You-Ting Liu. 
        <br>Inspired by the Red-winged Blackbird.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
