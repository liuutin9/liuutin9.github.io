<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="../logo.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="2400">
    <meta property="og:title" content="Stock Portfolio">
    <meta property="og:description" content="Stock Portfolio · Utin">
    <link rel="shortcut icon" href="../icon.ico" type="image/x-icon">
    <title>Stock Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a class="logo" href="./" style="text-decoration: none;">
            <img src="../icon.png" alt="Icon" class="nav-icon">
            STOCK<span>PORTFOLIO</span>
        </a>
        <div class="nav-right">
            <span class="nav-update" id="last-update-time">Loading...</span>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="切換模式">
                <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="sun-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </nav>

    <header>
        <div class="motto">Overview</div>
        <div class="hero-value-group">
            <span class="hero-label">Total Value</span>
            <div class="hero-value" id="total-market-value"><span class="loading"></span></div>
        </div>
        <div class="hero-stats">
            <div class="stat">
                <span class="stat-label">Cost</span>
                <span class="stat-value" id="total-cost"><span class="loading"></span></span>
            </div>
            <div class="stat">
                <span class="stat-label">Return</span>
                <span class="stat-value" id="total-return"><span class="loading"></span></span>
            </div>
        </div>

        <div class="allocation">
            <span class="stat-label">Allocation</span>
            <div class="allocation-bar" id="allocation-bar"></div>
            <div class="allocation-legend" id="allocation-legend"></div>
        </div>
    </header>

    <section id="holdings">
        <span class="section-title">01 / Holdings</span>
        <div class="list-container" id="holdings-list"></div>
    </section>

    <footer>
        <img src="../logo_dark.png" alt="Logo" class="footer-logo logo-dark-mode">
        <img src="../logo_light.png" alt="Logo" class="footer-logo logo-light-mode">
        <div class="footer-socials">
            <a href="https://github.com/liuutin9" target="_blank" class="social-icon" aria-label="GitHub">

            </a>
            <a href="https://www.linkedin.com/in/you-ting-liu-490b86243/" target="_blank" class="social-icon" aria-label="LinkedIn">

        </div>

    </footer>

    <script src="scripts.js"></script>
</body>
</html>
